<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Borromean but not Brunnian example from Run_results: L10n107</title>
  <desc id="desc">A schematic drawing illustrating a 4-component link that is Borromean but not Brunnian.</desc>
  <rect width="760" height="420" fill="#f8fafc"/>
  <text x="380" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#172033">Borromean but not Brunnian: L10n107</text>
  <text x="380" y="78" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#475569">Run_results classification: Brunnian=False, Borromean=True</text>

  <g transform="translate(0 10)">
    <ellipse cx="235" cy="225" rx="115" ry="55" fill="none" stroke="#2563eb" stroke-width="21"/>
    <ellipse cx="327" cy="225" rx="115" ry="55" fill="none" stroke="#dc2626" stroke-width="21"/>
    <ellipse cx="281" cy="164" rx="60" ry="109" fill="none" stroke="#16a34a" stroke-width="21"/>

    <path d="M 214 185 C 257 172 303 172 349 188" fill="none" stroke="#f8fafc" stroke-width="27" stroke-linecap="round"/>
    <path d="M 214 185 C 257 172 303 172 349 188" fill="none" stroke="#2563eb" stroke-width="21" stroke-linecap="round"/>

    <path d="M 370 263 C 324 276 276 276 230 261" fill="none" stroke="#f8fafc" stroke-width="27" stroke-linecap="round"/>
    <path d="M 370 263 C 324 276 276 276 230 261" fill="none" stroke="#dc2626" stroke-width="21" stroke-linecap="round"/>

    <path d="M 285 102 C 303 139 303 190 285 224" fill="none" stroke="#f8fafc" stroke-width="27" stroke-linecap="round"/>
    <path d="M 285 102 C 303 139 303 190 285 224" fill="none" stroke="#16a34a" stroke-width="21" stroke-linecap="round"/>

    <ellipse cx="570" cy="215" rx="88" ry="88" fill="none" stroke="#9333ea" stroke-width="21"/>
    <text x="570" y="334" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#475569">fourth component</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" fill="#334155">
    <text x="70" y="362" font-size="16">Borromean test:</text>
    <text x="190" y="362" font-size="16">every 2-component sublink is an unlink</text>
    <text x="70" y="388" font-size="16">Not Brunnian:</text>
    <text x="190" y="388" font-size="16">some delete-one sublink remains nontrivial</text>
  </g>
</svg>
